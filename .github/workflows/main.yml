name: Deploy to Cloud Run Service

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  PROJECT_ID: storage-entorno-de-desarrollo
  SERVICE_NAME: garmin-carousel-downloader
  REGION: us-central1
  WORKLOAD_IDENTITY_PROVIDER: projects/104248082609/locations/global/workloadIdentityPools/github/providers/github-provider-v2

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          version: ">= 363.0.0"

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build and Push Docker image
        run: |
          docker build -t gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }} .
          docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run Service
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 1Gi \
            --cpu 1 \
            --timeout 900 \
            --service-account=${{ secrets.SERVICE_ACCOUNT }} \
            --set-env-vars "NODE_ENV=production,DOWNLOADS_DIR=/tmp/garmin-downloads"

      - name: Show deployed service URL
        run: gcloud run services describe ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --format='value(status.url)'
